# Implementation Plan: Maintainability TODO (April 2026) — YAML Style

phases:
  - phase: 1
    name: Lint & Core Hygiene (P0)
    tasks:
      - id: 1.1
        name: Lint Fix - Core Services & Runtime
        scope: [lib/services/**, lib/runtime/**]
        steps:
          - Run eslint scoped to these folders
          - Fix all errors/warnings (ignore legacy/UI for now)
          - Commit: "fix: lint errors in core services/runtime"
        context_strategy: Only load/fix files with errors (batch by folder if needed)
      - id: 1.2
        name: Lint Ignore - Legacy/UI
        scope: [lib/gui/**, lib/unused/**]
        steps:
          - Add/adjust .eslintignore or config to skip these folders
          - Document in todo_maintainability.md for future cleanup
          - Commit: "chore: ignore legacy/UI for lint phase"
        context_strategy: Config only

  - phase: 2
    name: CI & Smoke Tests (P0)
    tasks:
      - id: 2.1
        name: Add Minimal CI Workflow
        scope: [.github/workflows/ci.yml]
        steps:
          - Create workflow: install deps, run lint, run requires check
          - Trigger: PR and push to main/dev
          - Commit: "ci: add minimal lint/require check workflow"
        context_strategy: Single file
      - id: 2.2
        name: Add Smoke Tests
        scope: [test/, lib/services/__tests__/]
        steps:
          - Add 5–10 tests for module install/disposal and service contract validation
          - Use minimal test runner (e.g., Jest, Vitest, or Node assert)
          - Commit: "test: add smoke tests for service boundaries"
        context_strategy: Per-test, per-service

  - phase: 3
    name: Hotspot Refactors & Service Consistency (P1)
    tasks:
      - id: 3.1
        name: Split Hotspot Files
        scope: [lib/services/combat/hunt_runner.js, lib/gui/bank_overview/**]
        steps:
          - For each file, segment into logical modules (strategy, movement, etc.)
          - For UI, isolate build artifact from source if possible
          - Commit: "refactor: split [file] into modules"
        context_strategy: Per-file, segment
      - id: 3.2
        name: Standardize Service Surfaces
        scope: [lib/services/*]
        steps:
          - Ensure every service dir has index.js and README.md
          - Add stubs if missing, document contract/entrypoint
          - Commit: "chore: standardize service entrypoints/docs"
        context_strategy: Per-service dir

  - phase: 4
    name: Process Hardening (P2)
    tasks:
      - id: 4.1
        name: Contributor Ergonomics
        scope: [project root]
        steps:
          - Add CONTRIBUTING.md, .editorconfig, .env.example
          - Add pre-commit lint hook (optional, e.g., Husky or simple npm script)
          - Commit: "docs/chore: add contributor and formatting configs"
        context_strategy: Root files
      - id: 4.2
        name: Maintainability KPI Tracking
        scope: [CI workflow, todo_maintainability.md]
        steps:
          - Update CI to output lint issue count, max file LOC, service coverage
          - Add KPI summary to todo_maintainability.md or CI badge in README
          - Commit: "ci/docs: add maintainability KPI tracking"
        context_strategy: CI + doc

general_guidance:
  - For each task, only load/edit files in scope to minimize context usage
  - Use batch commits per logical unit (not per-file unless needed for review)
  - Document any deferrals or known-debt in todo_maintainability.md
  - After each phase, re-run lint/tests/CI to verify no regressions
