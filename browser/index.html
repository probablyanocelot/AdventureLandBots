<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdventureLandBots Browser Bootstrap</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        line-height: 1.4;
      }
      button {
        font-size: 14px;
        padding: 10px 14px;
        cursor: pointer;
      }
      pre {
        margin-top: 16px;
        padding: 12px;
        border: 1px solid #ddd;
        background: #f8f8f8;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>AdventureLandBots Browser Bootstrap</h1>
    <p>Build first with <code>npm run build:browser</code>, then click run.</p>
    <button id="runBootstrap">Run client bootstrap</button>
    <pre id="output">Ready.</pre>

    <script type="module" src="./dist/bundle.js"></script>
    <script>
      const output = document.getElementById("output");
      const btn = document.getElementById("runBootstrap");

      function log(msg) {
        output.textContent += `\n${msg}`;
      }

      btn.addEventListener("click", async () => {
        try {
          output.textContent = "Running bootstrap...";
          if (
            !window.ALBootstrap ||
            typeof window.ALBootstrap.runClientBootstrap !== "function"
          ) {
            throw new Error(
              "ALBootstrap.runClientBootstrap was not found. Run npm run build:browser first.",
            );
          }
          await window.ALBootstrap.runClientBootstrap();
          log("Bootstrap finished.");
        } catch (err) {
          log(`Bootstrap failed: ${err && err.message ? err.message : err}`);
          console.error(err);
        }
      });
    </script>
  </body>
</html>
